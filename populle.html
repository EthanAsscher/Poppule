// ─── State ──────────────────────────────────────────────────────────────────
let pairs = [];
let pairIdx = 0;
let streak = 0;
let bestStreak = parseInt(localStorage.getItem('pop-best') || '0');
let totalPlayed = parseInt(localStorage.getItem('pop-played') || '0');
let totalCorrect = parseInt(localStorage.getItem('pop-correct') || '0');
let phase = "guess"; // guess, reveal, gameover
let currentLeft, currentRight, winner;

// ─── Smart Pairing Engine ───────────────────────────────────────────────────
function getMaxLogRatio(a, b) {
  const bothWild = a.type==="wild" && b.type==="wild";
  const hasWild = a.type==="wild" || b.type==="wild";
  const sameType = a.type === b.type;
  if (bothWild) return 1.3;
  if (hasWild) return 1.2;
  if (sameType) return 0.9;
  return 1.1;
}

function isGoodPair(a, b) {
  if (a.name === b.name || a.population === b.population) return false;
  const logDiff = Math.abs(Math.log10(Math.max(a.population,1)) - Math.log10(Math.max(b.population,1)));
  return logDiff <= getMaxLogRatio(a, b) && logDiff >= 0.02;
}

function generatePairs() {
  const p = []; const used = new Set(); let att = 0;
  while (p.length < 80 && att < 2000) {
    att++;
    const a = ITEMS[Math.floor(Math.random() * ITEMS.length)];
    const b = ITEMS[Math.floor(Math.random() * ITEMS.length)];
    const key = [a.name, b.name].sort().join("|");
    if (!used.has(key) && isGoodPair(a, b)) {
      used.add(key);
      p.push(Math.random() < 0.5 ? [a, b] : [b, a]);
    }
  }
  for (let i = p.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [p[i],p[j]]=[p[j],p[i]]; }
  return p;
}

// ─── Formatting ─────────────────────────────────────────────────────────────
function fmtPop(n) {
  if (n >= 1000000000) return (n/1000000000).toFixed(2) + "B";
  if (n >= 1000000) return (n/1000000).toFixed(1) + "M";
  if (n >= 1000) return (n/1000).toFixed(1) + "K";
  return n.toLocaleString();
}
function fmtFull(n) { return n.toLocaleString(); }

// ─── Rendering ──────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('stat-streak').textContent = streak;
  document.getElementById('stat-best').textContent = bestStreak;
  document.getElementById('stat-acc').textContent = totalPlayed > 0 ? Math.round(totalCorrect/totalPlayed*100)+'%' : '0%';

  const sb = document.getElementById('streak-banner');
  if (streak >= 3 && phase !== "gameover") {
    sb.classList.remove('hidden');
    const fire = streak >= 15 ? "🔥🔥🔥🔥" : streak >= 10 ? "🔥🔥🔥" : streak >= 5 ? "🔥🔥" : "🔥";
    sb.textContent = fire + " " + streak + " in a row!";
  } else {
    sb.classList.add('hidden');
  }
}

function renderPair() {
  currentLeft = pairs[pairIdx % pairs.length][0];
  currentRight = pairs[pairIdx % pairs.length][1];
  winner = currentLeft.population >= currentRight.population ? "left" : "right";

  const cl = document.getElementById('card-left');
  const cr = document.getElementById('card-right');

  cl.className = 'card card-left';
  cr.className = 'card card-right';

  document.getElementById('type-left').textContent = currentLeft.type === "wild" ? "?" : currentLeft.type;
  document.getElementById('flag-left').textContent = currentLeft.flag;
  document.getElementById('name-left').textContent = currentLeft.name;
  document.getElementById('tap-left').textContent = "Tap to choose";
  document.getElementById('tap-left').classList.remove('hidden');

  document.getElementById('type-right').textContent = currentRight.type === "wild" ? "?" : currentRight.type;
  document.getElementById('flag-right').textContent = currentRight.flag;
  document.getElementById('name-right').textContent = currentRight.name;
  document.getElementById('tap-right').textContent = "Tap to choose";
  document.getElementById('tap-right').classList.remove('hidden');

  // Remove old reveal elements
  document.querySelectorAll('.pop-reveal, .pick-badge, .crown').forEach(el => el.remove());

  document.getElementById('fact-card').classList.add('hidden');
  document.getElementById('next-btn').classList.add('hidden');
  document.getElementById('gameover').classList.add('hidden');
  document.getElementById('gameover').innerHTML = '';
  document.getElementById('ad-postgame').style.display = 'none';

  // Animate in
  const vc = document.getElementById('vs-container');
  vc.style.opacity = '0'; vc.style.transform = 'translateY(8px)';
  setTimeout(() => { vc.style.opacity = '1'; vc.style.transform = 'translateY(0)'; }, 50);

  phase = "guess";
  updateStats();

  // Pre-generate more pairs if running low
  if (pairIdx >= pairs.length - 3) {
    pairs = pairs.concat(generatePairs());
  }
}

function choose(side) {
  if (phase !== "guess") return;

  const chosen = side === "left" ? currentLeft : currentRight;
  const other = side === "left" ? currentRight : currentLeft;
  const correct = chosen.population >= other.population;

  totalPlayed++;
  localStorage.setItem('pop-played', totalPlayed);

  const cl = document.getElementById('card-left');
  const cr = document.getElementById('card-right');

  // Apply winner/loser styles
  cl.className = 'card revealed ' + (winner === 'left' ? 'winner' : 'loser');
  cr.className = 'card revealed ' + (winner === 'right' ? 'winner' : 'loser');

  // Hide tap text
  document.getElementById('tap-left').classList.add('hidden');
  document.getElementById('tap-right').classList.add('hidden');

  // Show population reveals
  ['left', 'right'].forEach(s => {
    const item = s === 'left' ? currentLeft : currentRight;
    const isWin = winner === s;
    const card = document.getElementById('card-' + s);

    const reveal = document.createElement('div');
    reveal.className = 'pop-reveal';
    reveal.innerHTML = `
      <div class="pop-label">Population</div>
      <div class="pop-number ${isWin ? 'win' : 'lose'}">${fmtPop(item.population)}</div>
      <div class="pop-full">${fmtFull(item.population)}</div>
    `;
    card.appendChild(reveal);

    // Crown on winner
    if (isWin) {
      const crown = document.createElement('div');
      crown.className = 'crown';
      crown.textContent = '👑';
      card.appendChild(crown);
    }

    // Pick badge on chosen
    if (s === side) {
      const badge = document.createElement('div');
      badge.className = 'pick-badge ' + (correct ? 'pick-correct' : 'pick-wrong');
      badge.textContent = correct ? '✓ PICK' : '✗ PICK';
      card.appendChild(badge);
    }
  });

  // Show fact
  const ratio = Math.max(currentLeft.population, currentRight.population) / Math.min(currentLeft.population, currentRight.population);
  const ratioLabel = ratio < 1.5 ? "Razor close!" : ratio < 3 ? "Tight one" : ratio < 8 ? "Tricky" : "Surprising";
  const winnerItem = winner === 'left' ? currentLeft : currentRight;

  document.getElementById('fact-label').textContent = ratioLabel;
  document.getElementById('fact-text').textContent = winnerItem.fact;
  document.getElementById('fact-card').classList.remove('hidden');

  if (correct) {
    streak++;
    totalCorrect++;
    localStorage.setItem('pop-correct', totalCorrect);
    if (streak > bestStreak) { bestStreak = streak; localStorage.setItem('pop-best', bestStreak); }
    phase = "reveal";
    document.getElementById('next-btn').classList.remove('hidden');
  } else {
    phase = "gameover";
    showGameOver();
  }

  updateStats();
}

function nextPair() {
  pairIdx++;
  renderPair();
}

function showGameOver() {
  const el = document.getElementById('gameover');
  el.classList.remove('hidden');
  document.getElementById('ad-postgame').style.display = 'flex';

  const title = streak === 0 ? "Oops!" : streak < 5 ? "Nice try!" : streak < 10 ? "Great run!" : streak < 20 ? "Amazing!" : "Legendary!";

  el.innerHTML = `
    <div class="go-title">${title}</div>
    <div class="go-sub">You got <strong style="color:#fff">${streak}</strong> in a row</div>
    <div class="go-btns">
      <button class="share-btn" id="share-btn" onclick="shareResult()">📋 Share</button>
      <button class="play-again-btn" onclick="restart()">Play again</button>
    </div>
  `;
}

function shareResult() {
  const text = `Populle 🌍 — ${streak} in a row!\nCan you guess which has more people?\nhttps://populle.com`;
  if (navigator.share) {
    navigator.share({ title: 'Populle', text: text }).catch(() => {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text);
    document.getElementById('share-btn').textContent = '✓ Copied!';
    setTimeout(() => { document.getElementById('share-btn').textContent = '📋 Share'; }, 2500);
  }
}

function restart() {
  streak = 0;
  pairs = generatePairs();
  pairIdx = 0;
  renderPair();
}

// ─── Init ───────────────────────────────────────────────────────────────────
pairs = generatePairs();
renderPair();
